<!-- milestone-chip.html — colour-coded badge for a single milestone event (e.g. "Sow Indoors", "Harvest"); used on the dashboard upcoming-milestones list. -->
<span class="milestone-chip"
      data-component="milestone-chip"
      data-plant-name="{{ include.plant_name }}"
      data-milestone="{{ include.milestone }}"
      data-month="{{ include.month }}">
</span>
