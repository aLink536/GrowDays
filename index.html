---
layout: default
title: Dashboard
js_file: dashboard.js
---
<!-- Dashboard — shows upcoming milestones and active plant cards for the current month. -->

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

  <!-- Page heading -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold">Your Garden This Month</h1>
      <p class="text-sm mt-1" style="color:var(--color-muted);" id="dashboard-month-label">Loading...</p>
    </div>
    <div class="text-right">

      
      <p class="text-xs uppercase tracking-wide font-medium mb-0.5" style="color:var(--color-muted);">Active plants</p>
      <span id="active-plant-count" class="text-3xl font-bold" style="color:var(--color-primary);">—</span>
    </div>
  </div>

  <!-- Upcoming milestones section -->
  <section class="mb-8" aria-labelledby="upcoming-heading">
    <h2 id="upcoming-heading" class="text-lg font-semibold mb-4">Upcoming Milestones</h2>
    <div id="upcoming-milestones"
         data-component="milestone-list"
         class="space-y-2"
         aria-live="polite">
      <!-- Populated by dashboard.js -->
      <p class="text-sm italic" style="color:var(--color-muted);" id="milestones-empty">Loading milestones...</p>
    </div>
  </section>

  <!-- Legend -->
  <section class="mb-8" aria-labelledby="legend-heading">
    <h2 id="legend-heading" class="text-lg font-semibold mb-4">Calendar Key</h2>
    <div class="flex flex-wrap gap-3">
      <div class="flex items-center gap-1.5 text-sm">
        <span class="inline-block w-3 h-3 rounded-full" style="background:var(--color-sow-indoors);"></span>
        Sow indoors
      </div>
      <div class="flex items-center gap-1.5 text-sm">
        <span class="inline-block w-3 h-3 rounded-full" style="background:var(--color-direct-sow);"></span>
        Direct sow
      </div>
      <div class="flex items-center gap-1.5 text-sm">
        <span class="inline-block w-3 h-3 rounded-full" style="background:var(--color-transplant);"></span>
        Transplant
      </div>
      <div class="flex items-center gap-1.5 text-sm">
        <span class="inline-block w-3 h-3 rounded-full" style="background:var(--color-flowering);"></span>
        Flowering
      </div>
      <div class="flex items-center gap-1.5 text-sm">
        <span class="inline-block w-3 h-3 rounded-full" style="background:var(--color-fruiting);"></span>
        Fruiting
      </div>
      <div class="flex items-center gap-1.5 text-sm">
        <span class="inline-block w-3 h-3 rounded-full" style="background:var(--color-harvest-start);"></span>
        Harvest
      </div>
    </div>
  </section>

  <!-- Active plants quick list -->
  <section aria-labelledby="active-heading">
    <h2 id="active-heading" class="text-lg font-semibold mb-4">Active Plants</h2>
    <div id="active-plant-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
      <!-- Populated by dashboard.js -->
    </div>
  </section>

</div>

<!-- Template: milestone card -->
<template id="milestone-card-tpl">
  <div class="flex items-center gap-3 p-3 rounded-lg border"
       style="border-color:var(--color-border);background:var(--color-surface);">
    <span class="milestone-chip flex-shrink-0" data-tpl-chip></span>
    <div class="min-w-0">
      <p class="text-sm font-medium truncate" data-tpl-plant-name></p>
      <p class="text-xs" style="color:var(--color-muted);" data-tpl-month-label></p>
    </div>
  </div>
</template>

<!-- Template: active plant card -->
<template id="active-plant-card-tpl">
  <a class="flex flex-col p-3 rounded-lg border hover:shadow-sm transition-shadow no-underline"
     style="border-color:var(--color-border);background:var(--color-surface);color:inherit;"
     data-tpl-href>
    <span class="font-medium text-sm" data-tpl-name></span>
    <span class="text-xs mt-0.5" style="color:var(--color-muted);" data-tpl-variety></span>
    <div class="flex flex-wrap gap-1 mt-2" data-tpl-tags></div>
  </a>
</template>
